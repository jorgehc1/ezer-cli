<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezerdesk Dev Server</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#1e293b}
.layout{display:grid;grid-template-columns:300px 1fr;height:100vh}
.sidebar{background:#fff;border-right:1px solid #e2e8f0;padding:1.5rem;overflow-y:auto}
.sidebar h1{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:1rem}
.sidebar button{display:block;width:100%;text-align:left;padding:.6rem 1rem;margin-bottom:.25rem;background:0 0;border:1px solid transparent;border-radius:6px;font-size:.875rem;cursor:pointer;color:#475569}
.sidebar button:hover{background:#f1f5f9;border-color:#e2e8f0}
.sidebar button.active{background:#eef2ff;border-color:#818cf8;color:#4f46e5;font-weight:600}
.sidebar .meta{margin-top:1rem;padding-top:1rem;border-top:1px solid #e2e8f0;font-size:.75rem;color:#94a3b8}
.main{display:flex;flex-direction:column}
.toolbar{padding:1rem 1.5rem;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:1rem;align-items:center}
.toolbar label{font-size:.8rem;font-weight:600;color:#64748b}
.toolbar button{padding:.5rem 1.25rem;background:#4f46e5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem}
.toolbar button:hover{background:#4338ca}
.content{flex:1;padding:1.5rem;overflow-y:auto}
.widget{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:1rem;margin-bottom:1rem}
.widget h3{font-size:.9rem;font-weight:700;margin-bottom:.75rem;color:#1e293b}
.widget p{font-size:.85rem;color:#64748b;margin-bottom:.5rem}
.widget .text-info{color:#2563eb}
.widget .text-muted{color:#94a3b8}
.widget .text-success{color:#16a34a}
.widget .text-warning{color:#d97706}
.widget .text-danger{color:#dc2626}
.widget label{display:block;font-size:.8rem;font-weight:600;color:#475569;margin-bottom:.25rem}
.widget input,.widget select{width:100%;padding:.5rem;border:1px solid #e2e8f0;border-radius:6px;font-size:.85rem;margin-bottom:.5rem}
.widget button{padding:.4rem 1rem;background:#4f46e5;color:#fff;border:none;border-radius:6px;cursor:pointer}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:99px;font-size:.7rem;font-weight:600}
.badge-success{background:#dcfce7;color:#16a34a}
.badge-warning{background:#fef3c7;color:#d97706}
.badge-danger{background:#fee2e2;color:#dc2626}
.badge-info{background:#dbeafe;color:#2563eb}
.log{background:#1e293b;color:#e2e8f0;font-family:monospace;font-size:.8rem;padding:.75rem;border-radius:6px;max-height:200px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
<h1>Eventos</h1>
<button class="active" onclick="sendEvent('get_metadata')">&#x1F4CB; GetMetadata</button>
<button onclick="sendEvent('page_request')">&#x1F4C4; PageRequest</button>
<button onclick="sendEvent('get_ui_fragments')">&#x1F9E9; GetUiFragments</button>
<button onclick="sendEvent('plugin_action')">&#x26A1; PluginAction</button>
<button onclick="sendEvent('ticket_created')">&#x1F3AB; TicketCreated</button>
<div class="meta">
<span id="plugin-name">Plugin: --</span>
<span id="plugin-version">Version: --</span>
<span id="plugin-author">Autor: --</span>
</div>
</div>
<div class="main">
<div class="toolbar">
<label>Parametros:</label>
<span id="param-info" style="font-size:.85rem;color:#64748b">(sin parametros)</span>
<div style="flex:1"></div>
<input id="page-id-input" placeholder="page_id (default: dashboard)" style="padding:0.4rem 0.75rem;border:1px solid #e2e8f0;border-radius:6px;font-size:.85rem;width:200px">
<button onclick="reloadPlugin()">&#x1F504; Recargar</button>
</div>
<div class="content" id="output"><div class="widget"><p style="color:#94a3b8">Cargando plugin...</p></div></div>
<div class="toolbar" style="border-top:1px solid #e2e8f0;border-bottom:none">
<label style="color:#94a3b8">Logs</label>
<button onclick="clearLogs()" style="background:#64748b">Limpiar</button>
</div>
<div class="log" id="log">[Cargando plugin WASM...]</div>
</div>
</div>
<script>
const WASM_BASE64 = "__WASM_BASE64__";

function log(msg){
  var el=document.getElementById('log');
  el.textContent+=msg+'\n';
  el.scrollTop=el.scrollHeight;
}

function clearLogs(){document.getElementById('log').textContent='';}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderWidgets(widgets,container){
  container.innerHTML='';
  if(!widgets||widgets.length===0){
    container.innerHTML='<div class="widget"><p style="color:#94a3b8">Sin widgets que mostrar.</p></div>';
    return;
  }
  for(var i=0;i<widgets.length;i++) container.appendChild(renderWidget(widgets[i]));
}

function renderWidget(w){
  var div=document.createElement('div');
  div.className='widget';
  switch(w.tipo){
    case 'card':
      div.innerHTML='<h3>'+esc(w.data.title)+'</h3>';
      if(w.data.children) for(var i=0;i<w.data.children.length;i++) div.appendChild(renderWidget(w.data.children[i]));
      break;
    case 'text':
      div.innerHTML='<p class="text-'+esc(w.data.style)+'">'+esc(w.data.content)+'</p>';
      break;
    case 'button':
      div.innerHTML='<button onclick="pluginAction(\''+esc(w.data.action)+'\')">'+esc(w.data.label)+'</button>';
      break;
    case 'badge':
      div.innerHTML='<span class="badge badge-'+esc(w.data.variant)+'">'+esc(w.data.content)+'</span>';
      break;
    case 'input':
      div.innerHTML='<label>'+esc(w.data.label)+'</label><input placeholder="'+esc(w.data.placeholder)+'" value="'+esc(w.data.value)+'">';
      break;
    default:
      div.innerHTML='<pre>'+esc(JSON.stringify(w,null,2))+'</pre>';
  }
  return div;
}

async function loadAndRun(eventJson){
  try{
    var bytes=Uint8Array.from(atob(WASM_BASE64),function(c){return c.charCodeAt(0);});
    log('[WASM] Cargando plugin ('+bytes.length+' bytes)...');

    var publishFn=function(ptr,len){
      var mem=inst.exports.memory;
      var buf=new Uint8Array(mem.buffer,ptr,len);
      var str=new TextDecoder().decode(buf);
      log('[Plugin] '+str);
      try{
        var data=JSON.parse(str);
        if(data.ui_widgets) renderWidgets(data.ui_widgets,document.getElementById('output'));
        if(data.success!==undefined&&data.response) log('[Action] '+data.response);
      }catch(e){}
    };

    var importObj={env:{
      host_publish_response:publishFn,
      host_kv_set:function(kp,kl,vp,vl){},
      host_kv_read:function(kp,kl,bp,bl){return 0;},
      host_http_request:function(rp,rl,bp,bl){return 0;},
      host_query:function(rp,rl,bp,bl){return 0;}
    }};

    var result=await WebAssembly.instantiate(bytes,importObj);
    var inst=result.instance;
    log('[WASM] Plugin instanciado correctamente.');

    function callEvent(eventJson){
      var str=eventJson+'\x00';
      var buf=new ArrayBuffer(str.length);
      var view=new Uint8Array(buf);
      for(var i=0;i<str.length;i++) view[i]=str.charCodeAt(i);
      var ptr=inst.exports.alloc(buf.byteLength);
      var mem=new Uint8Array(inst.exports.memory.buffer);
      mem.set(new Uint8Array(buf),ptr);
      inst.exports.on_event(ptr,str.length);
    }

    callEvent(JSON.stringify({event_type:'get_metadata'}));

    if(eventJson){
      log('[Event] Enviando: '+eventJson);
      callEvent(eventJson);
    }
  }catch(e){
    log('[ERROR] '+e.message);
    document.getElementById('output').innerHTML='<div class="widget" style="border-color:#dc2626"><h3 style="color:#dc2626">Error</h3><p>'+esc(e.message)+'</p></div>';
  }
}

function sendEvent(type){
  var btns=document.querySelectorAll('.sidebar button');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  event.target.classList.add('active');

  var pageId=document.getElementById('page-id-input').value||'dashboard';
  var eventJson;
  switch(type){
    case 'get_metadata':eventJson=JSON.stringify({event_type:'get_metadata'});break;
    case 'page_request':eventJson=JSON.stringify({event_type:'page_request',page_id:pageId});break;
    case 'get_ui_fragments':eventJson=JSON.stringify({event_type:'get_ui_fragments',location:'dashboard_widget'});break;
    case 'plugin_action':eventJson=JSON.stringify({event_type:'plugin_action',action:'test',data:{}});break;
    case 'ticket_created':eventJson=JSON.stringify({event_type:'ticket.created',ticket:{id:'test',asunto:'Ticket de prueba',descripcion:'Test',estado:'abierto',prioridad:'media',id_organizacion:'org',id_departamento:'dept',id_solicitante:'user'}});break;
  }
  document.getElementById('output').innerHTML='<div class="widget"><p style="color:#94a3b8">Ejecutando...</p></div>';
  loadAndRun(eventJson);
}

function reloadPlugin(){location.reload();}

window.onload=function(){sendEvent('get_metadata');};
</script>
</body>
</html>
